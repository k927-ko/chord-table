<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Chord Table</title>
    <style>
        :root {
            --c-bg: #F2F2F2;
            --c-white: #FFFFFF;
            --c-black: #000000;
            --c-dark: #3F3F3F;
            --c-blue-bg: #DDEEFF;
            --c-blue-txt: #000077;
            --c-red-bg: #FFDDDD;
            --c-red-txt: #900000;
            --c-green-bg: #CCFFCC;
            --c-green-txt: #005500;
            --c-orange-bg: #FFCCAA;
            --c-orange-txt: #AA3300;
            --c-purple-bg: #FFCCFF;
            --c-purple-txt: #660066;
            --c-yellow-bg: #FFFAAA;
            --c-yellow-txt: #777700;
            --c-accent: #FFCB03;
        }

        body {
            font-family: "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            background-color: var(--c-bg);
            color: var(--c-dark);
            font-size: 12px;
        }

        .header-fixed {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: var(--c-white);
            z-index: 1000;
            border-bottom: 2px solid var(--c-dark);
        }

        .header-inner {
            padding: 5px 10px;
        }

        .header-fixed.collapsed .header-content {
            display: none;
        }

        .toggle-btn {
            position: absolute;
            right: 10px;
            bottom: 5px;
            background: var(--c-white);
            border: 1px solid var(--c-dark);
            cursor: pointer;
            padding: 2px 6px;
            font-size: 12px;
        }

        .header-fixed.collapsed .toggle-btn {
            bottom: -22px;
            border-top: none;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 0 10px;
        }

        .meta-info {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .search-bar {
            position: relative;
            display: flex;
            gap: 4px;
            margin-bottom: 4px;
            align-items: center;
        }

        .search-bar input {
            border: 1px solid var(--c-dark);
            padding: 2px 4px;
            font-size: 12px;
            width: 220px;
        }

        #search-results {
            position: absolute;
            top: 24px;
            left: 55px;
            background: white;
            border: 1px solid var(--c-dark);
            width: 300px;
            z-index: 2000;
            display: none;
            max-height: 250px;
            overflow-y: auto;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .title-input {
            font-size: 36px;
            font-weight: bold;
            width: 100%;
            border: none;
            outline: none;
            color: var(--c-black);
            background: transparent;
        }

        .artist-input {
            font-size: 24px;
            width: 100%;
            border: none;
            outline: none;
            color: var(--c-dark);
            background: transparent;
        }

        .settings-grid {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 4px;
        }

        .setting-item {
            display: flex;
            align-items: center;
            gap: 2px;
            font-weight: bold;
        }

        .setting-item input,
        .setting-item select {
            border: 1px solid var(--c-dark);
            padding: 2px;
            font-size: 12px;
        }

        .btn {
            border: 1px solid var(--c-dark);
            padding: 4px 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            background: var(--c-white);
        }

        .btn-add {
            background: var(--c-green-bg);
            color: var(--c-green-txt);
            font-size: 16px;
        }

        .btn-publish {
            background: var(--c-purple-bg);
            color: var(--c-purple-txt);
        }

        .btn-play {
            background: var(--c-accent);
            color: var(--c-black);
        }

        .btn-mode {
            background: var(--c-blue-bg);
            color: var(--c-blue-txt);
            margin-left: auto;
        }

        body.mode-view .edit-only {
            display: none !important;
        }

        .sheet-area {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .sheet-row {
            display: flex;
            gap: 4px;
            background: var(--c-white);
            padding: 4px;
            border: 1px solid var(--c-dark);
            position: relative;
        }

        body.mode-view .sheet-row {
            border: none;
            border-bottom: 1px solid var(--c-dark);
            background: transparent;
        }

        /* 左操作パネル */
        .row-controls {
            display: grid;
            grid-template-areas:
                "drag  beat  bpm"
                "drag  copy  del";
            gap: 0px;
            align-items: center;
            padding: 0 8px;
        }

        .drag-handle {
            grid-area: drag;
        }

        .row-beats-select {
            grid-area: beat;
            margin: auto;
            width: 50px;
            height: 20px;
            font-size: 11px;
            cursor: pointer;
            background: var(--c-white);
            border: 1px solid var(--c-dark);
            color: var(--c-dark);
            margin: auto;
            width: 50px;
            height: 20px;
            font-size: 11px;
            text-align: center;
        }

        .row-bpm-input {
            grid-area: bpm;
            margin: auto;
            width: 50px;
            height: 20px;
            font-size: 11px;
            cursor: pointer;
            background: var(--c-white);
            border: 1px solid var(--c-dark);
            color: var(--c-dark);
            margin: auto;
            width: 50px;
            height: 20px;
            font-size: 11px;
            text-align: center;
        }

        .btn-copy {
            grid-area: copy;
            margin: auto;
            width: 50px;
            height: 20px;
            font-size: 11px;
            cursor: pointer;
            background: var(--c-bg);
            border: 1px solid var(--c-dark);
            color: var(--c-dark);
        }

        .btn-delete {
            grid-area: del;
            margin: auto;
            width: 50px;
            height: 20px;
            font-size: 11px;
            cursor: pointer;
            background: var(--c-red-bg);
            border: 1px solid var(--c-red-txt);
            color: var(--c-red-txt);
        }

        .chord-grid {
            display: grid;
            flex-grow: 1;
            gap: 2px;
        }

        .grid-1 {
            grid-template-columns: repeat(1, 1fr);
        }

        .grid-2 {
            grid-template-columns: repeat(2, 1fr);
        }

        .grid-3 {
            grid-template-columns: repeat(3, 1fr);
        }

        .grid-4 {
            grid-template-columns: repeat(4, 1fr);
        }

        .grid-5 {
            grid-template-columns: repeat(5, 1fr);
        }

        .grid-6 {
            grid-template-columns: repeat(6, 1fr);
        }

        .grid-7 {
            grid-template-columns: repeat(7, 1fr);
        }

        .grid-8 {
            grid-template-columns: repeat(8, 1fr);
        }

        .grid-9 {
            grid-template-columns: repeat(9, 1fr);
        }

        .grid-10 {
            grid-template-columns: repeat(10, 1fr);
        }

        .grid-11 {
            grid-template-columns: repeat(11, 1fr);
        }

        .grid-12 {
            grid-template-columns: repeat(12, 1fr);
        }

        .grid-13 {
            grid-template-columns: repeat(13, 1fr);
        }

        .grid-14 {
            grid-template-columns: repeat(14, 1fr);
        }

        .grid-15 {
            grid-template-columns: repeat(15, 1fr);
        }

        .grid-16 {
            grid-template-columns: repeat(16, 1fr);
        }

        .cell {
            border: 1px solid var(--c-dark);
            padding: 2px;
            background: #F2F2F2;
            display: flex;
            flex-direction: column;
        }

        .cell:focus-within {
            background: #FFFAAA;
            border: 2px solid var(--c-orange-txt);
            padding: 1px;
        }

        body.mode-view .cell {
            border: none;
            background: transparent;
        }

        .chord-input {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 32px;
            font-weight: bold;
            color: var(--c-orange-txt);
            text-align: center;
            outline: none;
        }

        .lyric-input {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 16px;
            color: var(--c-black);
            border-top: 1px solid var(--c-dark);
            outline: none;
        }

        .footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: var(--c-dark);
        }

        /* --- ここから：ドラッグ機能のデザイン --- */
        .drag-handle {
            cursor: grab;
            padding: 0 6px;
            color: #aaa;
            font-size: 18px;
            font-weight: bold;
            user-select: none;
            display: flex;
            align-items: center;
        }

        .drag-handle:active {
            cursor: grabbing;
        }

        /* ドラッグ中の行を半透明にする */
        .sheet-row.dragging {
            opacity: 0.4;
        }

        /* ドロップ先の目安（青い線） */
        .drop-target-above {
            box-shadow: 0 -3px 0 0 #007bff !important;
        }

        .drop-target-below {
            box-shadow: 0 3px 0 0 #007bff !important;
        }

        /* --- ここまで --- */
    </style>
</head>

<body class="mode-edit">

    <div class="header-fixed" id="main-header">
        <button class="toggle-btn" onclick="window.toggleHeader()">▲</button>
        <div class="header-inner header-content">
            <div class="container">
                <div id="meta-line" class="meta-info">ID: --- | Ver: --- | Updated: ---</div>
                <div class="search-bar">
                    SEARCH <input type="text" id="search-input" placeholder="Title, Artist, or ID..."
                        oninput="window.smartSearch()">
                    <div id="search-results"></div>
                </div>
                <input type="text" id="title" class="title-input" placeholder="SONG TITLE">
                <input type="text" id="artist" class="artist-input" placeholder="ARTIST NAME">
                <div class="settings-grid">
                    <div class="setting-item">KEY <input type="text" id="current-key" value="C" style="width:30px;">
                    </div>
                    <div class="setting-item">CAPO <input type="number" id="capo" value="0" style="width:35px;"></div>
                    <div class="edit-only">
                        <button class="btn" onclick="window.transposeByKeyBtn(-1)">KEY -1</button>
                        <button class="btn" onclick="window.transposeByKeyBtn(1)">KEY +1</button>
                    </div>
                    <div class="setting-item">BPM <input type="number" id="bpm" value="120" style="width:45px;"></div>
                    <div class="setting-item edit-only">BEAT/CELL <input type="number" id="beats-per-cell" value="1"
                            step="0.25" style="width:40px;"></div>
                    <div class="setting-item edit-only">DEFAULT BEATS
                        <select id="default-beats" style="width:45px;">
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4" selected>4</option>
                            <option value="5">5</option>
                            <option value="6">6</option>
                            <option value="7">7</option>
                            <option value="8">8</option>
                            <option value="9">9</option>
                            <option value="10">10</option>
                            <option value="11">11</option>
                            <option value="12">12</option>
                            <option value="13">13</option>
                            <option value="14">14</option>
                            <option value="15">15</option>
                            <option value="16">16</option>
                        </select>
                    </div>
                </div>
                <div class="controls">
                    <button class="btn btn-publish edit-only" onclick="window.publishToFirebase()">PUBLISH</button>
                    <button class="btn btn-play" id="playBtn" onclick="window.toggleScroll()">PLAY</button>
                    <button class="btn btn-mode" id="modeBtn" onclick="window.toggleMode()">VIEW MODE</button>
                </div>
            </div>
        </div>
    </div>

    <div class="container" id="main-container">
        <div id="sheet" class="sheet-area"></div>
        <div class="edit-only" style="margin-top:10px;">
            <button class="btn btn-add" style="width:100%;" onmousedown="event.preventDefault()"
                onclick="window.addRow();">+ ADD NEW LINE</button>
        </div>
    </div>

    <div class="footer">
        ©SMA Engineering Department<br>Access restricted to members of Sonic Music Addictions
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, getDocs, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "chord-table.firebaseapp.com",
            projectId: "chord-table",
            storageBucket: "chord-table.firebasestorage.app",
            messagingSenderId: "728251607996",
            appId: "1:728251607996:web:dc29c35d702f82410c19b9"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentSongId = null, currentPassword = null, currentVersion = 0, lastCapo = 0;
        const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        const normalize = (n) => n.toUpperCase().replace('DB', 'C#').replace('EB', 'D#').replace('GB', 'F#').replace('AB', 'G#').replace('BB', 'A#');

        const header = document.getElementById('main-header');
        const resizeObserver = new ResizeObserver(entries => {
            for (let entry of entries) {
                document.getElementById('main-container').style.marginTop = (entry.contentRect.height + 15) + 'px';
            }
        });
        resizeObserver.observe(header);

        window.toggleHeader = function () { header.classList.toggle('collapsed'); };

        window.smartSearch = async function () {
            const query = document.getElementById('search-input').value.toLowerCase();
            const resDiv = document.getElementById('search-results');
            if (query.length < 1) { resDiv.style.display = "none"; return; }
            const snap = await getDocs(collection(db, "songs"));
            let html = "";
            snap.forEach(s => {
                const d = s.data();
                if (s.id.includes(query) || d.title.toLowerCase().includes(query) || d.artist.toLowerCase().includes(query)) {
                    html += `<div style="padding:8px; border-bottom:1px solid #eee; cursor:pointer;" onclick="window.loadSongById('${s.id}')"><b>[${s.id}]</b> ${d.title} / ${d.artist}</div>`;
                }
            });
            resDiv.innerHTML = html || "<div style='padding:8px;'>No results</div>";
            resDiv.style.display = "block";
        };

        window.loadSongById = async function (id) {
            document.getElementById('search-results').style.display = "none";
            const snap = await getDoc(doc(db, "songs", id));
            if (snap.exists()) {
                const d = snap.data();
                document.getElementById('sheet').innerHTML = "";
                document.getElementById('title').value = d.title;
                document.getElementById('artist').value = d.artist;
                document.getElementById('current-key').value = d.key;
                document.getElementById('capo').value = d.capo;
                document.getElementById('bpm').value = d.bpm || 120;
                document.getElementById('beats-per-cell').value = d.beatsPerCell || 1;
                currentSongId = id; currentPassword = d.password; currentVersion = d.version;
                d.rows.forEach(r => {
                    const cleanedCells = r.cels.map(cell => ({
                        // chord="-"
                        c: cell.c === "-" ? "" : cell.c,
                        // lyric="lyric"
                        l: cell.l === "lyric" ? "" : cell.l
                    }));
                    window.addRow(r.b, cleanedCells);
                }); updateUI(d.updatedAt);
                document.body.className = "mode-view";
                document.getElementById('modeBtn').innerText = "EDIT MODE";
            }
        };
        window.duplicateRow = function (btn) {
            // 1. コピー元の行（row）を特定
            const sourceRow = btn.parentElement.parentElement;

            // 2. コピー元のデータを読み取る（セル数とBPM）
            const beats = parseInt(sourceRow.querySelector('.row-beats-select').value);
            const bpmValue = sourceRow.querySelector('.row-bpm-input').value;

            // コピー元のセル（コードと歌詞）の入力データを配列にまとめる
            const cellsData = Array.from(sourceRow.querySelectorAll('.cell')).map(c => ({
                c: c.querySelector('.chord-input').value,
                l: c.querySelector('.lyric-input').value
            }));

            // 3. 新しい行（DOM要素）を作成
            const newRow = document.createElement('div');
            newRow.className = 'sheet-row';

            // セルを描画する関数（addRowの中にあるものと同じ）
            const renderCells = (num, existingData) => {
                let html = "";
                for (let i = 0; i < num; i++) {
                    const cVal = (existingData && existingData[i]) ? existingData[i].c : '';
                    const lVal = (existingData && existingData[i]) ? existingData[i].l : '';
                    html += `<div class="cell"><input class="chord-input" value="${cVal}" placeholder="-" onfocus="this.select()"><input class="lyric-input" value="${lVal}" placeholder="lyric" onfocus="this.select()"></div>`;
                }
                return html;
            };

            // 4. 新しい行のHTMLを組み立てる（取得したBPMやコードのデータを入れる）
            newRow.innerHTML = `<div class="row-controls edit-only"><div class="drag-handle" title="ドラッグで移動">
                <svg viewBox="0 0 10 16" xmlns="http://www.w3.org/2000/svg" style="width: 12px; height: 18px; vertical-align: middle;">
                    <circle cx="2.5" cy="3" r="1.5" fill="#aaa"></circle>
                    <circle cx="7.5" cy="3" r="1.5" fill="#aaa"></circle>
                    <circle cx="2.5" cy="8" r="1.5" fill="#aaa"></circle>
                    <circle cx="7.5" cy="8" r="1.5" fill="#aaa"></circle>
                    <circle cx="2.5" cy="13" r="1.5" fill="#aaa"></circle>
                    <circle cx="7.5" cy="13" r="1.5" fill="#aaa"></circle>
                </svg>
                </div><select class="row-beats-select" onchange="window.updateRowBeats(this)">${getBeatsOptions(beats)}</select><input type="number" class="row-bpm-input" value="${bpmValue}" title="この行のBPM" style="width: 45px; margin: 0 4px; text-align: center;"><button class="btn-copy" onclick="window.duplicateRow(this)" style="margin-right: 4px;">COPY</button><button class="btn-delete" onclick="this.parentElement.parentElement.remove()">DEL</button></div><div class="chord-grid grid-${beats}">${renderCells(beats, cellsData)}</div>`;

            // 5. コピー元の行の「すぐ下」に挿入！
            sourceRow.after(newRow);
        };

        window.publishToFirebase = async function () {
            if (!currentSongId) {
                const p = prompt("Set edit password:");
                if (!p) return;
                const counterRef = doc(db, "counters", "song_id");
                const reusableRef = doc(db, "counters", "reusable_ids");
                await runTransaction(db, async (t) => {
                    const rSnap = await t.get(reusableRef);
                    let newId;
                    if (rSnap.exists() && rSnap.data().ids.length > 0) {
                        let ids = rSnap.data().ids.sort((a, b) => a - b);
                        newId = ids.shift();
                        t.update(reusableRef, { ids: ids });
                    } else {
                        const cSnap = await t.get(counterRef);
                        newId = cSnap.exists() ? cSnap.data().current + 1 : 1;
                        t.set(counterRef, { current: newId });
                    }
                    t.set(doc(db, "songs", newId.toString()), captureData(p, 1));
                    currentSongId = newId.toString();
                });
                alert("Published! ID: " + currentSongId);
            } else {
                const inputPass = prompt("Enter password:");
                if (inputPass === null) return;
                if (String(inputPass).trim() !== String(currentPassword).trim()) return alert("Wrong password.");
                currentVersion++;
                await updateDoc(doc(db, "songs", currentSongId), captureData(currentPassword, currentVersion));
                alert("Updated!");
            }
            updateUI(new Date().toLocaleString());
        };

        function captureData(p, v) {
            const rows = [];
            document.querySelectorAll('.sheet-row').forEach(r => {
                const bValue = parseInt(r.querySelector('.row-beats-select').value);
                const cels = Array.from(r.querySelectorAll('.cell')).map(c => ({
                    c: c.querySelector('.chord-input').value, l: c.querySelector('.lyric-input').value
                }));
                // 行ごとのBPMを取得（なければ全体設定のBPMをバックアップに使用）
                const rowBpmInput = r.querySelector('.row-bpm-input');
                const rbValue = rowBpmInput ? parseInt(rowBpmInput.value) : (parseInt(document.getElementById('bpm').value) || 120);

                rows.push({ b: bValue, rb: rbValue, cels }); // rb という名前で保存            
            });
            return {
                title: document.getElementById('title').value,
                artist: document.getElementById('artist').value,
                key: document.getElementById('current-key').value,
                capo: document.getElementById('capo').value,
                bpm: document.getElementById('bpm').value,
                beatsPerCell: document.getElementById('beats-per-cell').value,
                password: p, version: v, updatedAt: new Date().toLocaleString(), rows
            };
        }

        window.toggleMode = function () {
            if (!currentSongId) return alert("Please PUBLISH first.");
            if (document.body.classList.contains('mode-edit')) {
                document.body.className = "mode-view"; document.getElementById('modeBtn').innerText = "EDIT MODE";
            } else {
                const inputPass = prompt("Enter password:");
                if (inputPass === null) return;
                if (String(inputPass).trim() === String(currentPassword).trim()) {
                    document.body.className = "mode-edit"; document.getElementById('modeBtn').innerText = "VIEW MODE";
                } else {
                    alert("Wrong password.");
                }
            }
        };

        function getBeatsOptions(selected) {
            let opts = "";
            for (let i = 1; i <= 16; i++) {
                opts += `<option value="${i}" ${i == selected ? 'selected' : ''}>${i}</option>`;
            }
            return opts;
        }

        window.addRow = function (b = null, data = null) {
            const beats = b || document.getElementById('default-beats').value;
            const row = document.createElement('div');
            row.className = 'sheet-row';
            const renderCells = (num, existingData) => {
                let html = "";
                for (let i = 0; i < num; i++) {
                    const cVal = (existingData && existingData[i]) ? existingData[i].c : '';
                    const lVal = (existingData && existingData[i]) ? existingData[i].l : '';
                    html += `<div class="cell"><input class="chord-input" value="${cVal}" placeholder="-" onfocus="this.select()"><input class="lyric-input" value="${lVal}" placeholder="lyric" onfocus="this.select()"></div>`;
                }
                return html;
            };
            const currentGlobalBpm = document.getElementById('bpm').value || 120;
            row.innerHTML = `<div class="row-controls edit-only"><div class="drag-handle" title="ドラッグで移動">
                <svg viewBox="0 0 10 16" xmlns="http://www.w3.org/2000/svg" style="width: 12px; height: 18px; vertical-align: middle;">
                    <circle cx="2.5" cy="3" r="1.5" fill="#aaa"></circle>
                    <circle cx="7.5" cy="3" r="1.5" fill="#aaa"></circle>
                    <circle cx="2.5" cy="8" r="1.5" fill="#aaa"></circle>
                    <circle cx="7.5" cy="8" r="1.5" fill="#aaa"></circle>
                    <circle cx="2.5" cy="13" r="1.5" fill="#aaa"></circle>
                    <circle cx="7.5" cy="13" r="1.5" fill="#aaa"></circle>
                </svg>
                </div><select class="row-beats-select" onchange="window.updateRowBeats(this)">${getBeatsOptions(beats)}</select><input type="number" class="row-bpm-input" value="${currentGlobalBpm}" title="この行のBPM" style="width: 45px; margin: 0 4px; text-align: center;"><button class="btn-copy" onclick="window.duplicateRow(this)" style="margin-right: 4px;">COPY</button><button class="btn-delete" onclick="this.parentElement.parentElement.remove()">DEL</button></div><div class="chord-grid grid-${beats}">${renderCells(beats, data)}</div>`;
            // 現在どこかの入力欄（セル）にカーソルがあるか確認
            const activeEl = document.activeElement;
            const currentRow = activeEl ? activeEl.closest('.sheet-row') : null;

            if (currentRow && document.getElementById('sheet').contains(currentRow)) {
                // 選択中の行があれば、そのすぐ下に挿入
                currentRow.after(row);
            } else {
                // 何も選択していなければ、今まで通り一番下に追加
                document.getElementById('sheet').appendChild(row);
            }
        };

        window.updateRowBeats = function (selectEl) {
            const newBeats = selectEl.value;
            const gridDiv = selectEl.parentElement.nextElementSibling;
            const currentCells = Array.from(gridDiv.querySelectorAll('.cell')).map(c => ({
                c: c.querySelector('.chord-input').value, l: c.querySelector('.lyric-input').value
            }));
            gridDiv.className = `chord-grid grid-${newBeats}`;
            let newHtml = "";
            for (let i = 0; i < newBeats; i++) {
                const cVal = currentCells[i] ? currentCells[i].c : '';
                const lVal = currentCells[i] ? currentCells[i].l : '';
                newHtml += `<div class="cell"><input class="chord-input" value="${cVal}" placeholder="-" onfocus="this.select()"><input class="lyric-input" value="${lVal}" placeholder="lyric" onfocus="this.select()"></div>`;
            }
            gridDiv.innerHTML = newHtml;
        };

        document.getElementById('capo').addEventListener('input', (e) => {
            const newCapo = parseInt(e.target.value) || 0;
            window.transposeAllChords(lastCapo - newCapo);
            lastCapo = newCapo;
        });

        window.transposeByKeyBtn = function (amt) {
            const el = document.getElementById('current-key');
            let idx = notes.indexOf(normalize(el.value));
            let newKey = notes[(idx + amt + 12) % 12];
            el.value = newKey;
            window.transposeAllChords(amt);
        };

        window.transposeAllChords = function (amt) {
            document.querySelectorAll('.chord-input').forEach(input => {
                if (!input.value || input.value === "-") return;
                input.value = input.value.split('/').map(part => {
                    const m = part.match(/^[A-G](#|b)?/);
                    if (!m) return part;
                    const idx = notes.indexOf(normalize(m[0]));
                    return notes[(idx + amt + 12) % 12] + part.substring(m[0].length);
                }).join('/');
            });
        };

        let scroller = null;
        window.toggleScroll = function () {
            if (scroller) {
                // stop=>タイマー停止と余白のリセット
                clearInterval(scroller);
                scroller = null;
                document.getElementById('sheet').style.paddingTop = "0px";
                document.getElementById('playBtn').innerText = "PLAY";
            } else {
                document.getElementById('playBtn').innerText = "STOP";

                // 1行目の高さ測定，余白
                const firstRow = document.querySelector('.sheet-row');
                if (!firstRow) return;
                const rowHeight = firstRow.offsetHeight + 4;

                // 余白拡大　1s
                const intervalMs = 20;
                const frames = 1000 / intervalMs; // 50回
                const paddingStep = rowHeight / frames;

                let currentPadding = 0;
                let count = 0;

                scroller = setInterval(() => {
                    currentPadding += paddingStep;
                    // 上の余白拡張
                    document.getElementById('sheet').style.paddingTop = currentPadding + "px";
                    count++;

                    if (count >= frames) {
                        clearInterval(scroller);

                        // 時間計算スクロール
                        // 行BPM→合計時間算出
                        const bpc = parseFloat(document.getElementById('beats-per-cell').value) || 1;
                        const sheetRows = document.querySelectorAll('.sheet-row');
                        let totalTimeSeconds = 0;

                        sheetRows.forEach(r => {
                            const cellsInRow = r.querySelectorAll('.cell').length;
                            const rowBpmInput = r.querySelector('.row-bpm-input');
                            const rowBpm = rowBpmInput ? parseInt(rowBpmInput.value) : (parseInt(document.getElementById('bpm').value) || 120);

                            totalTimeSeconds += ((cellsInRow * bpc) / rowBpm) * 60;
                        });
                        // スクロール量計算
                        const scrollHeight = document.documentElement.scrollHeight - window.innerHeight;
                        const pixelsPerSecond = scrollHeight / totalTimeSeconds;
                        const mainStep = pixelsPerSecond * (intervalMs / 1000);

                        let currentScroll = window.scrollY;
                        scroller = setInterval(() => {
                            currentScroll += mainStep;
                            window.scrollTo(0, currentScroll);
                            // スクロール終了時
                            if (currentScroll >= scrollHeight) {
                                clearInterval(scroller); // スクロールstop
                                const shrinkScroller = setInterval(() => {
                                    currentPadding -= shrinkStep;
                                    // 常に余白>=0
                                    document.getElementById('sheet').style.paddingTop = Math.max(0, currentPadding) + "px";
                                    shrinkCount++;

                                    if (shrinkCount >= shrinkFrames) {
                                        clearInterval(shrinkScroller);
                                        scroller = null;
                                        document.getElementById('playBtn').innerText = "PLAY";
                                    }
                                }, intervalMs);
                            }
                        }, intervalMs);
                    }
                }, intervalMs);
            }
        };

        function updateUI(t) { document.getElementById('meta-line').innerText = `ID: ${currentSongId || '---'} | Ver: ${currentVersion} | Updated: ${t || '---'}`; }

        document.addEventListener('keydown', function (e) {
            if (e.key === 'Tab') {
                const active = document.activeElement;
                if (active && (active.classList.contains('chord-input') || active.classList.contains('lyric-input'))) {
                    e.preventDefault();
                    const allChords = Array.from(document.querySelectorAll('.chord-input'));
                    const allLyrics = Array.from(document.querySelectorAll('.lyric-input'));
                    const flow = allChords.concat(allLyrics);
                    const idx = flow.indexOf(active);
                    if (idx > -1) {
                        const nextIdx = idx + (e.shiftKey ? -1 : 1);
                        if (nextIdx >= 0 && nextIdx < flow.length) {
                            flow[nextIdx].focus();
                        } else if (nextIdx >= flow.length) {
                            const addBtn = document.querySelector('.btn-add');
                            if (addBtn) addBtn.focus();
                        }
                    }
                }
            }
        });

        window.addRow();

        // キーボード操作
        document.addEventListener('keydown', function (e) {
            // 1. 押されたのがSpace
            if (e.code === 'Space') {
                // 2. Viewモード∩入力欄触っていない時だけ実行
                const isViewMode = document.body.classList.contains('mode-view');
                const isTyping = e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA';

                if (isViewMode && !isTyping) {
                    e.preventDefault(); // 勝手なスクロール防止
                    window.toggleScroll(); // 再生・停止を実行
                }
            }
        });
        // ドラッグ＆ドロップ機能
        let draggedRow = null;
        const sheetContainer = document.getElementById('sheet');

        // ドラッグ時のみ行移動可能
        sheetContainer.addEventListener('mousedown', (e) => {
            if (e.target.closest('.drag-handle')) {
                e.target.closest('.sheet-row').setAttribute('draggable', 'true');
            }
        });
        sheetContainer.addEventListener('mouseup', (e) => {
            if (e.target.closest('.drag-handle')) {
                e.target.closest('.sheet-row').removeAttribute('draggable');
            }
        });

        // ドラッグ開始
        sheetContainer.addEventListener('dragstart', (e) => {
            if (e.target.classList.contains('sheet-row')) {
                draggedRow = e.target;
                setTimeout(() => e.target.classList.add('dragging'), 0);
            }
        });

        // ドラッグ終了（線を消すなどのお掃除）
        sheetContainer.addEventListener('dragend', (e) => {
            if (e.target.classList.contains('sheet-row')) {
                e.target.classList.remove('dragging');
                e.target.removeAttribute('draggable');
                draggedRow = null;
                document.querySelectorAll('.drop-target-above, .drop-target-below').forEach(el => {
                    el.classList.remove('drop-target-above', 'drop-target-below');
                });
            }
        });

        // ドラッグ中（マウスの位置を計算して、上か下かに青い線を引く）
        sheetContainer.addEventListener('dragover', (e) => {
            e.preventDefault(); // ドロップを許可するために必須のオマジナイ
            const targetRow = e.target.closest('.sheet-row');

            if (targetRow && targetRow !== draggedRow) {
                const rect = targetRow.getBoundingClientRect();
                const midY = rect.top + rect.height / 2; // 行の真ん中の高さ

                // 一旦すべての線を消す
                document.querySelectorAll('.drop-target-above, .drop-target-below').forEach(el => {
                    el.classList.remove('drop-target-above', 'drop-target-below');
                });

                // マウスが半分より上なら上に線、下なら下に線を引く
                if (e.clientY < midY) {
                    targetRow.classList.add('drop-target-above');
                } else {
                    targetRow.classList.add('drop-target-below');
                }
            }
        });

        // ドロップ（指を離したとき）に実際に要素を移動させる
        sheetContainer.addEventListener('drop', (e) => {
            e.preventDefault();
            const targetRow = e.target.closest('.sheet-row');

            if (targetRow && targetRow !== draggedRow) {
                // 線を消す
                document.querySelectorAll('.drop-target-above, .drop-target-below').forEach(el => {
                    el.classList.remove('drop-target-above', 'drop-target-below');
                });

                const rect = targetRow.getBoundingClientRect();
                const midY = rect.top + rect.height / 2;

                // 青い線の位置に合わせて移動（before: 上に挿入, after: 下に挿入）
                if (e.clientY < midY) {
                    targetRow.before(draggedRow);
                } else {
                    targetRow.after(draggedRow);
                }
            }
        });
    </script>
</body>
