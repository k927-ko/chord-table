<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Chord Table - Viewer</title>
    <style>
        :root {
            --c-bg: #F2F2F2;
            --c-white: #FFFFFF;
            --c-black: #000000;
            --c-dark: #3F3F3F;
            --c-orange-txt: #AA3300;
            --c-accent: #FFCB03;
        }

        body {
            font-family: sans-serif;
            margin: 0;
            background: white;
            color: var(--c-dark);
            font-size: 12px;
        }

        .header-fixed {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: white;
            border-bottom: 2px solid var(--c-dark);
            z-index: 1000;
        }

        .header-inner {
            padding: 10px;
        }

        .header-fixed.collapsed .header-content {
            display: none;
        }

        .toggle-btn {
            position: absolute;
            right: 10px;
            bottom: 5px;
            background: white;
            border: 1px solid var(--c-dark);
            cursor: pointer;
            padding: 2px 6px;
            font-size: 12px;
            z-index: 1001;
        }

        .header-fixed.collapsed .toggle-btn {
            bottom: -22px;
            border-top: none;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 0 10px;
        }

        .search-bar {
            position: relative;
            margin-bottom: 10px;
        }

        #search-results {
            position: absolute;
            background: white;
            border: 1px solid var(--c-dark);
            width: 300px;
            display: none;
            z-index: 2000;
            max-height: 250px;
            overflow-y: auto;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .title-display {
            font-size: 36px;
            font-weight: bold;
            color: var(--c-black);
        }

        .artist-display {
            font-size: 24px;
            color: var(--c-dark);
        }

        .chord-display {
            font-size: 32px;
            font-weight: bold;
            color: var(--c-orange-txt);
            text-align: center;
        }

        .lyric-display {
            font-size: 16px;
            border-top: 1px solid var(--c-dark);
            padding-top: 2px;
            text-align: left;
        }

        .sheet-row {
            display: flex;
            border-bottom: 1px solid var(--c-dark);
            padding: 8px 0;
        }

        .chord-grid {
            display: grid;
            flex-grow: 1;
            gap: 4px;
        }

        .grid-1 {
            grid-template-columns: repeat(1, 1fr);
        }

        .grid-2 {
            grid-template-columns: repeat(2, 1fr);
        }

        .grid-3 {
            grid-template-columns: repeat(3, 1fr);
        }

        .grid-4 {
            grid-template-columns: repeat(4, 1fr);
        }

        .grid-5 {
            grid-template-columns: repeat(5, 1fr);
        }

        .grid-6 {
            grid-template-columns: repeat(6, 1fr);
        }

        .grid-7 {
            grid-template-columns: repeat(7, 1fr);
        }

        .grid-8 {
            grid-template-columns: repeat(8, 1fr);
        }

        .grid-9 {
            grid-template-columns: repeat(9, 1fr);
        }

        .grid-10 {
            grid-template-columns: repeat(10, 1fr);
        }

        .grid-11 {
            grid-template-columns: repeat(11, 1fr);
        }

        .grid-12 {
            grid-template-columns: repeat(12, 1fr);
        }

        .grid-13 {
            grid-template-columns: repeat(13, 1fr);
        }

        .grid-14 {
            grid-template-columns: repeat(14, 1fr);
        }

        .grid-15 {
            grid-template-columns: repeat(15, 1fr);
        }

        .grid-16 {
            grid-template-columns: repeat(16, 1fr);
        }

        .footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: var(--c-dark);
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="header-fixed" id="main-header">
        <button class="toggle-btn" id="toggle-btn" onclick="window.toggleHeader()">▲</button>
        <div class="header-inner header-content">
            <div class="container">
                <div class="search-bar">
                    SEARCH <input type="text" id="search-input" oninput="window.smartSearch()">
                    <div id="search-results"></div>
                </div>
                <div id="title" class="title-display">---</div>
                <div id="artist" class="artist-display">---</div>
                <div style="margin-top:5px;">
                    KEY <input type="text" id="current-key" value="C" readonly style="width:30px; border:none;">
                    CAPO <input type="number" id="capo" value="0" style="width:35px;" readonly>
                    BPM <input type="number" id="bpm" value="120" style="width:40px;" readonly>
                    <button id="playBtn" onclick="window.toggleScroll()"
                        style="background:var(--c-accent); font-weight:bold; border:1px solid var(--c-dark); padding:2px 8px; cursor:pointer;">PLAY</button>
                </div>
            </div>
        </div>
    </div>
    <div class="container" id="main-container">
        <div id="sheet"></div>
    </div>

    <div class="footer">©SMA Engineering Department</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
        const firebaseConfig = {
            apiKey: "AIzaSyCiAyc-L0wxGBQ5Sd8JoKdY2OBPTAwsD7s",
            authDomain: "chord-table.firebaseapp.com",
            projectId: "chord-table",
            storageBucket: "chord-table.firebasestorage.app",
            messagingSenderId: "728251607996",
            appId: "1:728251607996:web:dc29c35d702f82410c19b9",
            measurementId: "G-3FHPM24B7S"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Header layout adjustment
        const header = document.getElementById('main-header');
        const resizeObserver = new ResizeObserver(entries => {
            for (let entry of entries) {
                document.body.style.paddingTop = (entry.contentRect.height + 15) + 'px';
            }
        });
        resizeObserver.observe(header);

        window.toggleHeader = function () {
            header.classList.toggle('collapsed');
            const btn = document.getElementById('toggle-btn');
            btn.innerText = header.classList.contains('collapsed') ? '▼' : '▲';
        };

        // Search function
        window.smartSearch = async function () {
            const q = document.getElementById('search-input').value.toLowerCase();
            const resDiv = document.getElementById('search-results');
            if (q.length < 1) { resDiv.style.display = "none"; return; }
            const snap = await getDocs(collection(db, "songs"));
            let html = "";
            snap.forEach(s => {
                const d = s.data();
                if (s.id.includes(q) || d.title.toLowerCase().includes(q) || d.artist.toLowerCase().includes(q)) {
                    html += `<div style="padding:8px; border-bottom:1px solid #eee; cursor:pointer;" onclick="window.load('${s.id}')">${d.title} / ${d.artist}</div>`;
                }
            });
            resDiv.innerHTML = html || "<div style='padding:8px;'>No results</div>";
            resDiv.style.display = "block";
        };

        window.load = async function (id) {
            const snap = await getDoc(doc(db, "songs", id));
            if (snap.exists()) {
                const d = snap.data();
                document.getElementById('title').innerText = d.title;
                document.getElementById('artist').innerText = d.artist;
                document.getElementById('current-key').value = d.key;
                document.getElementById('capo').value = d.capo || 0;
                document.getElementById('bpm').value = d.bpm || 120;

                const sheet = document.getElementById('sheet');
                sheet.innerHTML = "";
                d.rows.forEach(r => {
                    const row = document.createElement('div'); row.className = 'sheet-row';
                    let cells = "";
                    r.cels.forEach(c => {
                        cells += `<div class="cell"><div class="chord-display">${c.c || '-'}</div><div class="lyric-display">${c.l || ''}</div></div>`;
                    });
                    // Ensure layout matches beats setup in editor
                    row.innerHTML = `<div class="chord-grid grid-${r.b || r.cels.length}">${cells}</div>`;
                    sheet.appendChild(row);
                });
            }
            document.getElementById('search-results').style.display = "none";
        };

        let scroller = null;
        window.toggleScroll = function () {
            if (scroller) { clearInterval(scroller); scroller = null; document.getElementById('playBtn').innerText = "PLAY"; }
            else {
                const speed = (parseInt(document.getElementById('bpm').value) / 60);
                scroller = setInterval(() => window.scrollBy(0, 1), 100 / speed);
                document.getElementById('playBtn').innerText = "STOP";
            }
        };
    </script>
</body>

</html>
