<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Viewer - Chord Table</title>
    <style>
        /* スタイルは index.html と同一のため省略（実際には全コードを記述してください） */
        :root {
            --c-bg: #F2F2F2; --c-white: #FFFFFF; --c-black: #000000; --c-dark: #3F3F3F;
            --c-blue-bg: #DDEEFF;  --c-blue-txt: #000077;
            --c-red-bg: #FFDDDD;   --c-red-txt: #900000;
            --c-green-bg: #CCFFCC; --c-green-txt: #005500;
            --c-orange-bg: #FFCCAA;--c-orange-txt: #AA3300;
            --c-purple-bg: #FFCCFF;--c-purple-txt: #660066;
            --c-yellow-bg: #FFFAAA;--c-yellow-txt: #777700;
            --c-accent: #FFCB03;
        }
        body { font-family: "Helvetica Neue", Arial, sans-serif; margin: 0; background-color: var(--c-bg); color: var(--c-dark); font-size: 12px; }
        .header-fixed { position: fixed; top: 0; left: 0; width: 100%; background: var(--c-white); z-index: 1000; border-bottom: 2px solid var(--c-dark); padding: 5px 0; }
        .container { max-width: 1200px; margin: auto; padding: 0 10px; }
        .title-display { font-size: 32px; font-weight: bold; }
        .artist-display { font-size: 20px; color: var(--c-dark); margin-bottom: 5px; }
        .settings-info { display: flex; gap: 15px; font-weight: bold; margin-bottom: 10px; }
        .sheet-area { display: flex; flex-direction: column; gap: 4px; }
        .sheet-row { display: flex; gap: 4px; padding-bottom: 5px; border-bottom: 1px solid var(--c-dark); }
        .chord-grid { display: grid; flex-grow: 1; gap: 2px; }
        .cell { display: flex; flex-direction: column; text-align: center; }
        .chord-val { font-size: 32px; font-weight: bold; color: var(--c-orange-txt); }
        .lyric-val { font-size: 16px; color: var(--c-black); }
        .btn { border: 1px solid var(--c-dark); padding: 4px 8px; cursor: pointer; font-weight: bold; background: var(--c-accent); }
        
        /* Grid definitions (1-16) remain same */
        .grid-1 { grid-template-columns: repeat(1, 1fr); } .grid-2 { grid-template-columns: repeat(2, 1fr); }
        .grid-3 { grid-template-columns: repeat(3, 1fr); } .grid-4 { grid-template-columns: repeat(4, 1fr); }
        .grid-5 { grid-template-columns: repeat(5, 1fr); } .grid-6 { grid-template-columns: repeat(6, 1fr); }
        .grid-7 { grid-template-columns: repeat(7, 1fr); } .grid-8 { grid-template-columns: repeat(8, 1fr); }
        .grid-9 { grid-template-columns: repeat(9, 1fr); } .grid-10 { grid-template-columns: repeat(10, 1fr); }
        .grid-11 { grid-template-columns: repeat(11, 1fr); } .grid-12 { grid-template-columns: repeat(12, 1fr); }
        .grid-13 { grid-template-columns: repeat(13, 1fr); } .grid-14 { grid-template-columns: repeat(14, 1fr); }
        .grid-15 { grid-template-columns: repeat(15, 1fr); } .grid-16 { grid-template-columns: repeat(16, 1fr); }
    </style>
</head>
<body>

<div class="header-fixed" id="header">
    <div class="container">
        <div id="title" class="title-display">---</div>
        <div id="artist" class="artist-display">---</div>
        <div class="settings-info">
            <span id="key-info">KEY: ---</span>
            <span id="capo-info">CAPO: ---</span>
            <span id="bpm-info">BPM: ---</span>
            <button class="btn" id="playBtn" onclick="window.toggleScroll()">PLAY</button>
        </div>
    </div>
</div>

<div class="container" style="margin-top:140px;" id="main-container">
    <div id="sheet" class="sheet-area"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { /* 同一のConfigを記述 */ };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let songData = null;
    const urlParams = new URLSearchParams(window.location.search);
    const songId = urlParams.get('id');

    async function load() {
        if(!songId) return;
        const snap = await getDoc(doc(db, "songs", songId));
        if(snap.exists()) {
            songData = snap.data();
            document.getElementById('title').innerText = songData.title;
            document.getElementById('artist').innerText = songData.artist;
            document.getElementById('key-info').innerText = "KEY: " + songData.key;
            document.getElementById('capo-info').innerText = "CAPO: " + songData.capo;
            document.getElementById('bpm-info').innerText = "BPM: " + (songData.bpm || 120);
            
            const sheet = document.getElementById('sheet');
            songData.rows.forEach(r => {
                const row = document.createElement('div');
                row.className = `sheet-row`;
                let cellsHtml = "";
                r.cels.forEach(c => {
                    cellsHtml += `<div class="cell"><div class="chord-val">${c.c || '-'}</div><div class="lyric-val">${c.l || '&nbsp;'}</div></div>`;
                });
                row.innerHTML = `<div class="chord-grid grid-${r.b}">${cellsHtml}</div>`;
                sheet.appendChild(row);
            });
            // Adjust margin based on header height
            document.getElementById('main-container').style.marginTop = (document.getElementById('header').offsetHeight + 20) + "px";
        }
    }

    let scroller = null;
    window.toggleScroll = function() {
        if (scroller) {
            clearInterval(scroller); scroller = null;
            document.getElementById('playBtn').innerText = "PLAY";
        } else {
            if(!songData) return;
            const bpm = parseInt(songData.bpm) || 120;
            const bpc = parseFloat(songData.beatsPerCell) || 1;
            
            // 全セル数をカウント
            let totalCells = 0;
            songData.rows.forEach(r => totalCells += r.cels.length);
            
            const totalBeats = totalCells * bpc;
            const totalTimeSeconds = (totalBeats / bpm) * 60;

            const scrollHeight = document.documentElement.scrollHeight - window.innerHeight;
            if (scrollHeight <= 0) return;

            const pixelsPerSecond = scrollHeight / totalTimeSeconds;
            const intervalMs = 20;
            const step = pixelsPerSecond * (intervalMs / 1000);

            let currentScroll = window.scrollY;
            scroller = setInterval(() => {
                currentScroll += step;
                window.scrollTo(0, currentScroll);
                if (currentScroll >= scrollHeight) {
                    clearInterval(scroller); scroller = null;
                    document.getElementById('playBtn').innerText = "PLAY";
                }
            }, intervalMs);
            document.getElementById('playBtn').innerText = "STOP";
        }
    };

    load();
</script>
</body>
</html>
